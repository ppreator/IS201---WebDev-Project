        <!-- Page Header-->
       <header class="masthead" style="background-image: url('assets/img/contact-bg.jpg'); background-size: cover; background-position: center;">
            <div class="container position-relative px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">
                        <div class="page-heading">
                            <h1>Contact Me</h1>
                            <span class="subheading">I'd love to connect — reach out anytime.</span>
                        </div>
                    </div>

            </div>

        <!-- Main Content-->
        <main class="mb-4">
            <div class="container px-4 px-lg-5">
                <div class="row gx-4 gx-lg-5 justify-content-center">
                    <div class="col-md-10 col-lg-8 col-xl-7">

                        <!-- Direct contact info -->
                        <h2>Get in Touch</h2>
                        <ul>
                            <li>Email: myemail@example.com</li>
                            <li>Phone: (123) 456-7890</li>
                        </ul>

                        <hr class="my-4" />

                        <!-- Contact form -->
                        <h2>Send Me a Message</h2>
                        <form id="contactForm">
                            <div class="form-floating mb-3">
                                <input class="form-control" id="name" type="text" placeholder="Enter your name..." required />
                                <label for="name">Name</label>
                            </div>
                            <div class="form-floating mb-3">
                                <input class="form-control" id="email" type="email" placeholder="name@example.com" required />
                                <label for="email">Email address</label>
                            </div>
                            <div class="form-floating mb-3">
                                <textarea class="form-control" id="message" placeholder="Enter your message here..." style="height: 12rem" required></textarea>
                                <label for="message">Message</label>
                            </div>
                            <div class="d-grid">
                                <button class="btn btn-primary btn-lg" id="submitButton" type="submit">Submit</button>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </main>
